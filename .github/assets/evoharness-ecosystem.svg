    <text x="22" y="84" fill="#0F172A" font-size="30" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Bounded Change</text>
    <text x="24" y="128" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• operator proposal</text>
    <text x="24" y="158" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• candidate patches</text>
    <text x="24" y="188" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• validation gates</text>
    <text x="24" y="218" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• promote / hold / rollback</text>
    <text x="24" y="248" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• ecosystem growth discipline</text>
