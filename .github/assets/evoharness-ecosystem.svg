    <text x="22" y="84" fill="#0F172A" font-size="30" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">7 Bundled Packs</text>
    <text x="24" y="128" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• safe-inspector</text>
    <text x="24" y="158" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• evolution-studio</text>
    <text x="24" y="188" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• web-research</text>
    <text x="24" y="218" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• workspace-ops</text>
    <text x="24" y="248" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• delivery-lab</text>
