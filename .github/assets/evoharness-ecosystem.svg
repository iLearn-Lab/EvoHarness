    <rect x="22" y="20" width="126" height="30" rx="8" fill="url(#cyan)"/>
    <text x="85" y="40" fill="white" font-size="14" text-anchor="middle" font-family="Consolas, monospace" font-weight="700">RUNTIME STATE</text>
    <text x="22" y="84" fill="#0F172A" font-size="30" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Long-Horizon Memory</text>
    <text x="24" y="128" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• session archive</text>
    <text x="24" y="158" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• task records</text>
    <text x="24" y="188" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• approvals and policies</text>
    <text x="24" y="218" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• memory and instructions</text>
    <text x="24" y="248" fill="#334155" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">• analytics and doctor state</text>
