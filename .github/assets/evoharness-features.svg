<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FB"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F9A8D4"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="760" rx="28" fill="url(#bg)"/>
  <text x="72" y="76" fill="#0F172A" font-size="42" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">✨ Harness Research Surface Map</text>
  <text x="72" y="116" fill="#475569" font-size="22" font-family="Segoe UI, Inter, Arial, sans-serif">five visible subsystems coordinate the runtime: tool-use, workflow packaging, memory, governance, and ecosystem expansion</text>

  <circle cx="800" cy="392" r="146" fill="url(#hub)"/>
  <circle cx="800" cy="392" r="126" fill="#0F172A" opacity="0.9"/>
  <text x="800" y="368" text-anchor="middle" fill="#E0F2FE" font-size="34" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">EvoHarness</text>
  <text x="800" y="406" text-anchor="middle" fill="#BAE6FD" font-size="23" font-family="Segoe UI, Inter, Arial, sans-serif">terminal-native agent harness</text>
  <text x="800" y="438" text-anchor="middle" fill="#93C5FD" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif">coding workflows + controlled self-evolution</text>

  <path d="M800 246V180" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M670 318L564 258" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M930 318L1036 258" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M690 472L590 548" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M910 472L1010 548" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>

  <g transform="translate(620 62)">
    <rect width="360" height="108" rx="22" fill="#FFFFFF" stroke="#D7E3F3" stroke-width="2"/>
    <rect x="22" y="18" width="122" height="28" rx="8" fill="url(#cyan)"/>
    <text x="83" y="37" text-anchor="middle" fill="white" font-size="14" font-family="Consolas, monospace" font-weight="700">AGENT LOOP</text>
    <text x="22" y="72" fill="#0F172A" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">streaming tool-use and session control</text>
    <text x="22" y="96" fill="#475569" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif">iterative action, observation, and transcript-aware runtime flow</text>
  </g>

  <g transform="translate(182 158)">
    <rect width="382" height="122" rx="22" fill="#FFFFFF" stroke="#D7E3F3" stroke-width="2"/>
    <rect x="22" y="18" width="146" height="28" rx="8" fill="url(#green)"/>
    <text x="95" y="37" text-anchor="middle" fill="white" font-size="14" font-family="Consolas, monospace" font-weight="700">HARNESS TOOLKIT</text>
    <text x="22" y="72" fill="#0F172A" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">files, shell, search, tasks, registry, MCP, subagents</text>
    <text x="22" y="98" fill="#475569" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif">26 builtin tools give the harness hands, eyes, and operational reach</text>
  </g>

  <g transform="translate(1036 158)">
    <rect width="382" height="122" rx="22" fill="#FFFFFF" stroke="#D7E3F3" stroke-width="2"/>
    <rect x="22" y="18" width="162" height="28" rx="8" fill="url(#pink)"/>
    <text x="103" y="37" text-anchor="middle" fill="white" font-size="14" font-family="Consolas, monospace" font-weight="700">PLUGIN + MCP</text>
    <text x="22" y="72" fill="#0F172A" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">workflow bundles, servers, tools, resources, prompts</text>
    <text x="22" y="98" fill="#475569" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif">plugins and MCP turn the runtime into a growing ecosystem surface</text>
  </g>

  <g transform="translate(178 548)">
    <rect width="412" height="126" rx="22" fill="#FFFFFF" stroke="#D7E3F3" stroke-width="2"/>
    <rect x="22" y="18" width="164" height="28" rx="8" fill="url(#violet)"/>
    <text x="104" y="37" text-anchor="middle" fill="white" font-size="14" font-family="Consolas, monospace" font-weight="700">CONTEXT + MEMORY</text>
    <text x="22" y="74" fill="#0F172A" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">prompt assembly, instructions, archive, resume, memory</text>
    <text x="22" y="100" fill="#475569" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif">long-horizon state lets the harness accumulate operational knowledge</text>
  </g>

  <g transform="translate(1010 548)">
    <rect width="412" height="126" rx="22" fill="#FFFFFF" stroke="#D7E3F3" stroke-width="2"/>
    <rect x="22" y="18" width="146" height="28" rx="8" fill="url(#orange)"/>
    <text x="95" y="37" text-anchor="middle" fill="white" font-size="14" font-family="Consolas, monospace" font-weight="700">GOVERNANCE</text>
    <text x="22" y="74" fill="#0F172A" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">approvals, permissions, hooks, validation, rollback</text>
    <text x="22" y="100" fill="#475569" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif">safety and promotion control keep self-evolution bounded and inspectable</text>
  </g>
</svg>
